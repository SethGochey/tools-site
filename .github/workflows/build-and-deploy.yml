name: Build & Deploy

on:
  # Trigger on pushes to this repo
  push:
    branches: [main]

  # Trigger when siege-perilous-ux publishes a new release or pushes to main
  # (requires a webhook or repository_dispatch from that repo — see README)
  repository_dispatch:
    types: [ux-updated]

  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tools-site
        uses: actions/checkout@v4

      - name: Fetch shared CSS from siege-perilous-ux
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/SethGochey/siege-perilous-ux/main/siege.css" \
            -o siege.css

      - name: Inject shared CSS into index.html
        run: |
          python3 - <<'EOF'
          import re, pathlib

          css   = pathlib.Path("siege.css").read_text()
          html  = pathlib.Path("index.html").read_text()

          marker = r'/\*\s*@siege-ux-inject\s*\*/'

          if not re.search(marker, html):
              raise SystemExit(
                  "ERROR: injection marker /* @siege-ux-inject */ not found in index.html"
              )

          # Wrap with a clear comment so the built file is self-documenting
          injected = (
              "/* ── BEGIN: siege-perilous-ux shared styles "
              "(injected at build time — do not edit here) ── */\n"
              + css.strip()
              + "\n/* ── END: siege-perilous-ux shared styles ── */"
          )

          result = re.sub(marker, injected, html)
          pathlib.Path("dist/index.html").parent.mkdir(exist_ok=True)
          pathlib.Path("dist/index.html").write_text(result)
          print("Injection complete.")
          EOF

      - name: Copy CNAME to dist
        run: cp CNAME dist/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
